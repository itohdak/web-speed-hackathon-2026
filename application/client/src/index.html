<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CaX</title>
    <% for (const href of htmlWebpackPlugin.files.css) { %>
    <link rel="stylesheet" href="/<%= href.replace(/^\/+/, '') %>" />
    <% } %>
    <% for (const src of htmlWebpackPlugin.files.js) { %>
    <script defer src="/<%= src.replace(/^\/+/, '') %>"></script>
    <% } %>
    <style>
      :root {
        color: #0f3d3e;
        background: #f5f5f4;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #app {
        min-height: 100%;
      }

      body {
        margin: 0;
        background: #f5f5f4;
        color: #0f3d3e;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      #app {
        min-height: 100vh;
      }

      .app-shell {
        position: relative;
        z-index: 0;
        display: flex;
        justify-content: center;
      }

      .app-frame {
        display: flex;
        min-height: 100vh;
        max-width: 100%;
        background: #fff;
        color: #0f3d3e;
      }

      .app-main {
        width: 100vw;
        max-width: 40rem;
        min-width: 0;
        padding-bottom: 3rem;
      }

      .app-nav {
        position: fixed;
        right: 0;
        bottom: 0;
        left: 0;
        z-index: 10;
        height: 3rem;
        border-top: 1px solid #d6d3d1;
        background: #fff;
      }

      .timeline-list,
      .search-page {
        width: 100%;
      }

      .timeline-item {
        padding-inline: 0.25rem;
      }

      .timeline-item__body {
        display: flex;
        border-bottom: 1px solid #d6d3d1;
        padding: 0.5rem 0.5rem 1rem;
      }

      .timeline-item__avatar {
        flex: 0 0 auto;
        padding-right: 0.5rem;
      }

      .timeline-item__avatar-link {
        display: block;
        overflow: hidden;
        width: 3rem;
        height: 3rem;
        border: 1px solid #d6d3d1;
        border-radius: 9999px;
        background: #fafaf9;
      }

      .timeline-item__main {
        min-width: 0;
        flex: 1 1 auto;
      }

      .timeline-item__meta {
        overflow: hidden;
        margin: 0;
        white-space: nowrap;
        text-overflow: ellipsis;
        font-size: 0.875rem;
      }

      .timeline-item__text {
        line-height: 1.625;
      }

      .timeline-item__media {
        margin-top: 0.5rem;
      }

      .search-page__form {
        padding: 1rem;
        background: #fff;
        box-shadow: 0 1px 2px rgb(0 0 0 / 0.08);
      }

      @media (min-width: 64rem) {
        .app-main {
          padding-bottom: 0;
        }

        .app-nav {
          position: relative;
          width: 12rem;
          height: auto;
          border-top: 0;
          border-right: 1px solid #d6d3d1;
        }

        .timeline-item {
          padding-inline: 1rem;
        }

        .timeline-item__body {
          padding-inline: 1rem;
        }

        .timeline-item__avatar {
          padding-right: 1rem;
        }

        .timeline-item__avatar-link {
          width: 4rem;
          height: 4rem;
        }
      }
    </style>
    <script defer src="/vendor/tailwindcss-browser-4.2.1.js"></script>
    <style type="text/tailwindcss">
      @layer base {
        button:not(:disabled),
        [role="button"]:not(:disabled) {
          cursor: pointer;
        }
      }

      @theme {
        --color-cax-canvas: var(--color-stone-100);
        --color-cax-surface: var(--color-white);
        --color-cax-surface-raised: var(--color-white);
        --color-cax-surface-subtle: var(--color-stone-50);
        --color-cax-overlay: var(--color-slate-950);
        --color-cax-border: var(--color-stone-300);
        --color-cax-border-strong: var(--color-stone-400);
        --color-cax-text: var(--color-teal-950);
        --color-cax-text-muted: var(--color-teal-700);
        --color-cax-text-subtle: var(--color-slate-500);
        --color-cax-brand: var(--color-teal-700);
        --color-cax-brand-strong: var(--color-teal-800);
        --color-cax-brand-soft: var(--color-teal-100);
        --color-cax-accent: var(--color-orange-700);
        --color-cax-accent-soft: var(--color-orange-100);
        --color-cax-danger: var(--color-red-600);
        --color-cax-danger-soft: var(--color-red-100);
        --color-cax-highlight: var(--color-amber-200);
        --color-cax-highlight-ink: var(--color-amber-950);
      }

      @utility markdown {
        @apply text-sm wrap-anywhere;
        line-break: strict;

        :where(a) {
          @apply text-cax-accent decoration-cax-accent underline underline-offset-2;
        }
        :where(strong) {
          @apply font-bold;
        }
        :where(em) {
          @apply italic;
        }
        :where(code):not(:where(pre > code)) {
          @apply bg-cax-surface-subtle text-cax-text rounded px-1 py-0.5 font-mono;
        }
        :where(del) {
          @apply decoration-cax-text-subtle line-through;
        }

        :where(p) {
          @apply text-cax-text my-6;
        }
        :where(blockquote) {
          @apply border-cax-border text-cax-text-muted my-6 border-l-4 pl-4;
        }
        :where(hr) {
          @apply border-cax-border my-10 border-t;
        }

        :where(ol) {
          @apply my-6 list-decimal pl-6;
        }
        :where(ul) {
          @apply my-6 list-disc pl-6;
        }
        :where(li) {
          @apply my-2;
        }
        :where(ol > li, ul > li)::marker {
          @apply text-cax-text-muted;
        }
        :where(ol ol, ul ul, ol ul, ul ol) {
          @apply my-2;
        }

        :where(table) {
          @apply text-cax-text my-6 w-full table-auto text-sm;
        }
        :where(thead) {
          @apply border-cax-border border-b;
        }
        :where(thead th) {
          @apply px-2 pb-1.5 font-bold;
        }
        :where(tbody tr) {
          @apply border-cax-border border-b;
        }
        :where(tbody tr:last-child) {
          @apply border-b-0;
        }
        :where(tbody td) {
          @apply align-baseline;
        }
        :where(tfoot) {
          @apply border-cax-border border-t;
        }
        :where(tfoot td) {
          @apply align-top;
        }
        :where(th, td) {
          @apply text-left;
        }
        :where(tbody td, tfoot td) {
          @apply px-2 py-1.5;
        }
        :where(tbody tr:last-child td, tfoot tr:last-child td) {
          @apply pb-0;
        }

        :where(h1, h2, h3, h4, h5, h6) {
          @apply text-cax-text text-pretty;
        }
        :where(h1, h2, h3, h4) {
          @apply font-bold;
        }
        :where(h1, h2) {
          @apply mt-10 mb-8 text-2xl;
        }
        :where(h3) {
          @apply mt-8 mb-6 text-xl;
        }
        :where(h4) {
          @apply mt-6 mb-4 text-lg;
        }
        :where(h5) {
          @apply border-cax-border mt-6 mb-4 border-b py-0.5 pl-2 font-bold;
        }
        :where(h6) {
          @apply border-cax-border mt-6 mb-4 border-b py-0.5 pl-2;
        }
        :where(h1 + *, h2 + *, h3 + *, h4 + *, h5 + *, h6 + *) {
          @apply mt-0;
        }

        :where(.footnotes) {
          @apply border-cax-border mt-8 border-t;
        }
        :where(.footnotes h2) {
          @apply sr-only;
        }
        :where(.footnotes ol) {
          @apply mt-8 mb-0 text-sm;
        }
        :where(.footnotes ol li p) {
          @apply my-0;
        }

        & > *:first-child {
          @apply mt-0;
        }

        & > *:last-child {
          @apply mb-0;
        }
      }
    </style>
  </head>
  <body class="bg-cax-canvas text-cax-text">
    <div id="app"></div>
  </body>
</html>
